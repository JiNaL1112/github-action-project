namespace: webapps
mysql:
  image: mysql:8
  port: 3306
  database: bankappdb
  rootPassword: "Test@123" # move to a secrets-only values file / --set in CI, don't commit real passwords
  storage: 2Gi
bankapp:
  image:
    repository: jpatel6625/bankapp
    tag: 4744b096024846e4973455353c5ca331ce386ef3
  replicas: 1
  port: 8080
  dbUsername: root
  dbPassword: "Test@123" # same note as above
  service:
    type: LoadBalancer
    port: 80
  initContainer:
    enabled: true
    image: busybox:1.36
    # how long to wait for mysql-service:3306 before giving up (init containers
    # retry the whole loop indefinitely, this just controls the sleep interval)
    pollIntervalSeconds: 2
# Set to false if the "webapps" namespace already exists / is managed elsewhere,
# and instead run: helm install bankapp . --create-namespace --namespace webapps
createNamespace: true
