name: CI Pipeline 

on:
  push:
    branches: [ "master"  , "develop" , "feature/*" ]
    paths-ignore:
      - 'bankapp/values-*.yaml'
  pull_request:
    branches: [ "master"  ]

# Least-privilege default; jobs that need more (e.g. SARIF upload) elevate explicitly.
permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/bankapp


jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn compile
      
  security-check:
    runs-on: ubuntu-latest
    needs: compile
    permissions:
      contents: read
      security-events: write  # required to upload SARIF to the Security tab
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Populate Maven cache
      run: mvn -B dependency:go-offline --file pom.xml


     # Replaces manual apt-key/wget install with the maintained action:
    # faster, cached vuln DB, and native SARIF output. 
    - name: Trivy filesystem scan
      uses: aquasecurity/trivy-action@v0.9.0
      with:
          scan-type: fs
          image-ref: '.'
          format: sarif
          output: trivy-fs-report.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'          # actually fail the build on real findings
          ignore-unfixed: true    # don't block on vulns with no available fix

    - name: Upload Trivy fs report as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
          name: trivy-fs-report
          path: trivy-fs-report.sarif
    
    - name: Upload Trivy fs results to Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
          sarif_file: trivy-fs-report.sarif
          category: trivy-fs
      
  build_project_and_sonar_scan:
    runs-on: ubuntu-latest
    needs: security-check
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # required for accurate SonarQube blame/history data

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Tests with Coverage
      run: mvn -B test
      env:
        DB_USERNAME: ${{ secrets.DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    - name: Verify JaCoCo report exists
      run: |
        test -f target/site/jacoco/jacoco.xml
        head -20 target/site/jacoco/jacoco.xml

    - name: Build Project
      run: mvn package -DskipTests

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
        retention-days: 14 
        
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@0303d6b62e310685c0e34d0b9cde218036885c4d # v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: SonarQube Quality Gate check
      uses: sonarsource/sonarqube-quality-gate-action@8e9b0ca0a7273d6f16986388d98393efdfcf56fd # git ls-remote https://github.com/SonarSource/sonarqube-quality-gate-action.git refs/heads/master
      with:
        pollingTimeoutSec: 600
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: build_project_and_sonar_scan
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      security-events: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
    - uses: actions/checkout@v4

    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: app   # JAR lands in ./app, matching Dockerfile's COPY app/*.jar


    # Generates real, traceable tags instead of the previously-undefined
    # ${{ steps.meta.outputs.tag }} reference (was empty -> broken pushes).
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=stage,enable=${{ github.ref == 'refs/heads/stage' }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=
 
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker image
      uses: docker/build-push-action@v6
      with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

     # Scan the actual image that will be deployed, not just source files.
    - name: Trivy image scan
      uses: aquasecurity/trivy-action@v0.9.0
      with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-image-report.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
 
    - name: Upload Trivy image results to Security tab
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
          sarif_file: trivy-image-report.sarif
          category: trivy-image