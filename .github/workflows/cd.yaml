name: CD Pipeline (GitOps)

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (leave blank to use 'latest')"
        required: false
        default: ""

permissions:
  contents: write   # needed to push the values.yaml bump back to the repo

jobs:
  update-image-tag:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_PAT }}
          ref: master

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump bankapp image tag in Helm values
        run: |
          yq -i '.bankapp.image.tag = "${{ steps.tag.outputs.tag }}"' bankapp/values.yaml

      - name: Show diff
        run: git diff bankapp/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bankapp/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit — image tag already up to date."
          else
            git commit -m "ci: bump bankapp image to ${{ steps.tag.outputs.tag }}"
            git push origin HEAD:master
          fi

      - name: Summary
        run: |
          echo "### Deployed image tag: \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "ArgoCD will pick up this change on its next sync (default poll: ~3 min), or immediately if a webhook is configured." >> "$GITHUB_STEP_SUMMARY"