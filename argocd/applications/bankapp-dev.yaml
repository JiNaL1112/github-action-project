apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bankapp-dev
  namespace: argocd
spec:
  project: bankapp-project
  source:
    repoURL: https://github.com/JiNaL1112/github-action-project.git
    targetRevision: develop
    path: bankapp
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: webapps-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true